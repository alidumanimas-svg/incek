<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İNCEK — Yönetici Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #111318;
  --surface2: #181b22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: rgba(201,168,76,0.12);
  --text: #e8eaf0;
  --text2: #8b90a0;
  --text3: #555b6e;
  --green: #4caf82;
  --green-dim: rgba(76,175,130,0.12);
  --red: #e05252;
  --red-dim: rgba(224,82,82,0.12);
  --blue: #4a8fe0;
  --blue-dim: rgba(74,143,224,0.12);
  --orange: #e09a4a;
  --orange-dim: rgba(224,154,74,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(10,12,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--gold);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--gold);letter-spacing:3px;font-weight:500}
.header-right{display:flex;align-items:center;gap:16px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.last-update{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

/* NAV TABS */
.nav{display:flex;gap:4px;padding:1rem 2rem 0;border-bottom:1px solid var(--border)}
.nav-btn{padding:10px 20px;background:none;border:none;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN */
.main{padding:2rem;max-width:1400px;margin:0 auto}

/* OZET KARTLAR */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.gold::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.kpi.green::before{background:var(--green)}
.kpi.red::before{background:var(--red)}
.kpi.blue::before{background:var(--blue)}
.kpi-label{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-1px}
.kpi-value.gold{color:var(--gold2)}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-value.blue{color:var(--blue)}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace}

/* SECTION */
.section{margin-bottom:2.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-title{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text2)}
.section-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;font-weight:500}
.badge-gold{background:var(--gold-dim);color:var(--gold2)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}

/* TABLO */
.tbl-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-scroll{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.num{text-align:right;font-family:'DM Mono',monospace;font-size:13px}
.proje-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:1px}
.p-i2{background:var(--blue-dim);color:var(--blue)}
.p-i3{background:var(--green-dim);color:var(--green)}
.p-i4{background:var(--gold-dim);color:var(--gold2)}
.p-mamak{background:var(--orange-dim);color:var(--orange)}
.durum-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace}
.d-gelecek{background:var(--blue-dim);color:var(--blue)}
.d-bugece{background:var(--orange-dim);color:var(--orange)}
.d-gecikti{background:var(--red-dim);color:var(--red)}
.d-odendi{background:var(--green-dim);color:var(--green)}

/* AY TABLOSU */
.ay-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.ay-kart{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
.ay-kart:hover{border-color:var(--border2)}
.ay-baslik{font-size:11px;color:var(--text3);letter-spacing:2px;margin-bottom:8px;font-family:'DM Mono',monospace}
.ay-tahsil{font-size:18px;font-weight:700;color:var(--green)}
.ay-tahsil-edilemeyen{font-size:13px;color:var(--red);margin-top:4px}
.ay-kisi{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold2)}
.search-box{flex:1;min-width:180px;padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Syne',sans-serif;font-size:12px}
.search-box::placeholder{color:var(--text3)}
.search-box:focus{outline:none;border-color:var(--border2)}

/* PANEL */
.panel{display:none}
.panel.active{display:block}

/* PROGRESS BAR */
.progress-wrap{background:rgba(255,255,255,0.05);border-radius:4px;height:4px;margin-top:6px}
.progress-bar{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2))}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;gap:12px;color:var(--text3)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .header{padding:0 1rem}
  .main{padding:1rem}
  .nav{padding:.75rem 1rem 0;overflow-x:auto}
  .nav-btn{white-space:nowrap;padding:8px 14px;font-size:12px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .ay-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark"></div>
    <div>
      <div class="logo-text">İNCEK</div>
      <div class="logo-sub">YÖNETİCİ PANELİ</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="status-dot" style="background:var(--text3);box-shadow:none"></div>

</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('ozet',this)">ÖZET</button>
  <button class="nav-btn" onclick="switchTab('gunluk',this)">GÜNLÜK</button>
  <button class="nav-btn" onclick="switchTab('haftalik',this)">HAFTALIK</button>
  <button class="nav-btn" onclick="switchTab('aylik',this)">AYLIK PLAN</button>
  <button class="nav-btn" onclick="switchTab('gecmis',this)">GEÇMİŞ AYLAR</button>
  <button class="nav-btn" onclick="switchTab('gelecek',this)">GELECEK AY</button>

<div class="main">

<!-- ÖZET -->

    <div class="section-header">

    </div>

  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title">Gecikmiş Ödemeler</div>
      <div class="section-badge badge-red" id="gecikme-badge">—</div>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll" id="gecikme-tbl"><div class="loading"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- GÜNLÜK -->
<div id="panel-gunluk" class="panel">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setGunFilter('bugun',this)">Bugün</button>
    <button class="filter-btn" onclick="setGunFilter('yarin',this)">Yarın</button>
    <button class="filter-btn" onclick="setGunFilter('3gun',this)">3 Gün</button>

    <input class="search-box" type="date" id="gun-date" onchange="setGunFilter('tarih',this)">
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title" id="gunluk-title">Bugünkü Ödemeler</div>
      <div class="section-badge badge-blue" id="gunluk-badge">—</div>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll" id="gunluk-tbl"><div class="loading"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- HAFTALIK -->
<div id="panel-haftalik" class="panel">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setHaftaFilter('bu',this)">Bu Hafta</button>
    <button class="filter-btn" onclick="setHaftaFilter('gelecek',this)">Gelecek Hafta</button>
    <button class="filter-btn" onclick="setHaftaFilter('2hafta',this)">2 Hafta</button>
    <button class="filter-btn" onclick="setHaftaFilter('4hafta',this)">4 Hafta</button>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title" id="haftalik-title">Bu Haftanın Ödemeleri</div>
      <div class="section-badge badge-gold" id="haftalik-badge">—</div>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll" id="haftalik-tbl"><div class="loading"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- AYLIK PLAN -->
<div id="panel-aylik" class="panel">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setAyFilter('bu',this)">Bu Ay</button>
    <button class="filter-btn" onclick="setAyFilter('gelecek',this)">Gelecek Ay</button>
    <select id="ay-select" class="search-box" style="max-width:160px" onchange="setAyFilter('secim',this)">
    </select>
    <select id="proje-filter-ay" class="search-box" style="max-width:130px" onchange="renderAylik()">
      <option value="">Tüm Projeler</option>
      <option>İNCEK-2</option><option>İNCEK-3</option><option>İNCEK-4</option><option>MAMAK</option>
    </select>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title" id="aylik-title">Bu Ayın Taksit Planı</div>
      <div class="section-badge badge-gold" id="aylik-badge">—</div>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll" id="aylik-tbl"><div class="loading"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- GEÇMİŞ AYLAR -->
<div id="panel-gecmis" class="panel">
  <div class="section">
    <div class="section-header">
      <div class="section-title">Ay Bazlı Tahsilat Özeti</div>
    </div>
    <div class="ay-grid" id="gecmis-ay-grid"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <div class="section" style="margin-top:2rem">
    <div class="section-header">
      <div class="section-title" id="gecmis-detay-title">Tahsil Edilemeyen Müşteriler</div>
      <div class="section-badge badge-red" id="gecmis-detay-badge">—</div>
    </div>
    <div class="filter-bar">
      <select id="gecmis-ay-select" class="search-box" style="max-width:180px" onchange="renderGecmisDetay()">
      </select>
      <select id="proje-filter-gecmis" class="search-box" style="max-width:130px" onchange="renderGecmisDetay()">
        <option value="">Tüm Projeler</option>
        <option>İNCEK-2</option><option>İNCEK-3</option><option>İNCEK-4</option><option>MAMAK</option>
      </select>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll" id="gecmis-detay-tbl"><div class="loading"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- GELECEK AY -->
<div id="panel-gelecek" class="panel">
  <div class="filter-bar">
    <select id="proje-filter-gelecek" class="search-box" style="max-width:130px" onchange="renderGelecek()">
      <option value="">Tüm Projeler</option>
      <option>İNCEK-2</option><option>İNCEK-3</option><option>İNCEK-4</option><option>MAMAK</option>
    </select>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title" id="gelecek-title">Gelecek Ay Taksit Planı</div>
      <div class="section-badge badge-blue" id="gelecek-badge">—</div>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll" id="gelecek-tbl"><div class="loading"><div class="spinner"></div></div></div></div>
  </div>
</div>

<!-- ERTELEME -->
<div id="panel-erteleme" class="panel">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setErtFilter('tumu',this)">Tümü</button>
    <button class="filter-btn" onclick="setErtFilter('bu_ay',this)">Bu Ay</button>
    <button class="filter-btn" onclick="setErtFilter('1_kez',this)">1 Kez Ertelenen</button>
    <button class="filter-btn" onclick="setErtFilter('cok',this)">2+ Kez Ertelenen</button>
    <select id="proje-filter-ert" class="search-box" style="max-width:130px" onchange="renderErteleme()">
      <option value="">Tüm Projeler</option>
      <option>İNCEK-2</option><option>İNCEK-3</option><option>İNCEK-4</option><option>MAMAK</option>
    </select>
    <input class="search-box" type="text" placeholder="Müşteri ara..." id="ert-search" oninput="renderErteleme()" style="max-width:200px">
  </div>

  <div class="kpi-grid" id="ert-kpi" style="margin-bottom:1.5rem"></div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Erteleme Geçmişi</div>
      <div class="section-badge badge-gold" id="ert-badge">—</div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-scroll" id="ert-tbl"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">En Çok Ertelenen Müşteriler</div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-scroll" id="ert-top-tbl"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

</div><!-- /main -->

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwonUwnkndwrvSX-xCYhwCd3MRvfWflzEMSSzb3PemYOcNj17S4emfKGFpHEyyPIZA/exec';

let allData = null;
let gunFilter = 'bugun';
let haftaFilter = 'bu';
let ayFilter = 'bu';
let ayFilterDate = null;

const AYLAR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const fmt = v => Math.round(v||0).toLocaleString('tr-TR');
const fmtM = v => { v = Math.round(v||0); if(v>=1000000) return (v/1000000).toFixed(1)+'M'; if(v>=1000) return (v/1000).toFixed(0)+'K'; return v.toString(); };
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const parseDate = s => { if(!s) return null; try{ const d=new Date(s); return isNaN(d)?null:d; }catch{return null;} };

function projeBadge(p) {
  const cls = p==='İNCEK-2'?'p-i2':p==='İNCEK-3'?'p-i3':p==='İNCEK-4'?'p-i4':'p-mamak';
  return `<span class="proje-badge ${cls}">${p}</span>`;
}

function durumBadge(t) {
  const vade = parseDate(t.VADE);
  const odeme = parseDate(t['ÖDEME TARİHİ']);
  const durum = (t.DURUM||'').toUpperCase();
  if(durum.includes('ÖDENDİ')||durum.includes('ODENDI')||odeme) return `<span class="durum-badge d-odendi">✓ Ödendi</span>`;
  if(!vade) return '';
  const now = today();
  if(vade < now) return `<span class="durum-badge d-gecikti">⚠ Gecikmeli</span>`;
  const diff = Math.round((vade-now)/86400000);
  if(diff===0) return `<span class="durum-badge d-bugece">● Bugün</span>`;
  return `<span class="durum-badge d-gelecek">${diff}g</span>`;
}

function taksitTbody(list) {
  if(!list.length) return '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:2rem">Kayıt bulunamadı</td></tr>';
  return list.map(t => {
    const vade = parseDate(t.VADE);
    const vadeStr = vade ? vade.toLocaleDateString('tr-TR') : '—';
    return `<tr>
      <td>${t['ADI SOYADI']||''}</td>
      <td>${projeBadge(t.PROJE||'')}</td>
      <td class="num">${fmt(t.TUTAR)} ₺</td>
      <td>${vadeStr}</td>
      <td>${durumBadge(t)}</td>
      <td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:12px">${t.AÇIKLAMA||''}</td>
    </tr>`;
  }).join('');
}

function taksitTable(list) {
  return `<table>
    <thead><tr>
      <th>MÜŞTERİ</th><th>PROJE</th><th class="num">TUTAR ₺</th>
      <th>VADE</th><th>DURUM</th><th>AÇIKLAMA</th>
    </tr></thead>
    <tbody>${taksitTbody(list)}</tbody>
  </table>`;
}

// JSONP
function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => { delete window[cbName]; script.remove(); reject(new Error('Timeout')); }, 30000);
    window[cbName] = data => { clearTimeout(timeout); delete window[cbName]; script.remove(); resolve(data); };
    script.src = url + (url.includes('?')?'&':'?') + 'callback=' + cbName;
    script.onerror = () => { clearTimeout(timeout); reject(new Error('Script error')); };
    document.head.appendChild(script);
  });
}

function renderOzet() {
  if(!allData) return;
  const musteriler = allData.musteriler || [];
  const taksitler = allData.taksitler || [];
  const now = today();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  const toplamSozlesme = musteriler.filter(m=>m.DURUM!=='SÖZLEŞME İPTAL').reduce((s,m)=>s+(parseFloat(m['TOPLAM TUTAR'])||0),0);
  const toplamOdenen = musteriler.filter(m=>m.DURUM!=='SÖZLEŞME İPTAL').reduce((s,m)=>s+(parseFloat(m['ÖDENEN'])||0),0);
  const toplamKalan = musteriler.filter(m=>m.DURUM!=='SÖZLEŞME İPTAL').reduce((s,m)=>s+(parseFloat(m['KALAN'])||0),0);
  const aktifMusteri = musteriler.filter(m=>m.DURUM==='DEVAM EDİYOR').length;
  const geckmisMusteriler = musteriler.filter(m=>m.DURUM==='GECİKMİŞ').length;

  // Bu ay vadesi gelecek
  const buAyTaksitler = taksitler.filter(t=>{
    const v = parseDate(t.VADE);
    const odeme = parseDate(t['ÖDEME TARİHİ']);
    const durum = (t.DURUM||'').toUpperCase();
    if(durum.includes('ÖDENDİ')||odeme) return false;
    return v && v.getMonth()===thisMonth && v.getFullYear()===thisYear;
  });
  const buAyToplam = buAyTaksitler.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);

  // Gecikmiş
  const gecikmisTaksitler = taksitler.filter(t=>{
    const v = parseDate(t.VADE);
    const odeme = parseDate(t['ÖDEME TARİHİ']);
    const durum = (t.DURUM||'').toUpperCase();
    if(durum.includes('ÖDENDİ')||odeme) return false;
    return v && v < now;
  });
  const gecikmesToplam = gecikmisTaksitler.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);

  const tahsilatOran = toplamSozlesme > 0 ? (toplamOdenen/toplamSozlesme*100) : 0;

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi gold">
      <div class="kpi-label">Toplam Sözleşme</div>
      <div class="kpi-value gold">${fmtM(toplamSozlesme)} ₺</div>
      <div class="kpi-sub">${musteriler.filter(m=>m.DURUM!=='SÖZLEŞME İPTAL').length} aktif sözleşme</div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">Tahsil Edilen</div>
      <div class="kpi-value green">${fmtM(toplamOdenen)} ₺</div>
      <div class="kpi-sub">%${tahsilatOran.toFixed(1)} oranında</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${Math.min(100,tahsilatOran)}%"></div></div>
    </div>
    <div class="kpi red">
      <div class="kpi-label">Kalan Alacak</div>
      <div class="kpi-value red">${fmtM(toplamKalan)} ₺</div>
      <div class="kpi-sub">${aktifMusteri} devam eden müşteri</div>
    </div>
    <div class="kpi blue">
      <div class="kpi-label">Bu Ay Vadeli</div>
      <div class="kpi-value blue">${fmtM(buAyToplam)} ₺</div>
      <div class="kpi-sub">${buAyTaksitler.length} taksit</div>
    </div>
    <div class="kpi red">
      <div class="kpi-label">Gecikmiş</div>
      <div class="kpi-value red">${fmtM(gecikmesToplam)} ₺</div>
      <div class="kpi-sub">${gecikmisTaksitler.length} taksit · ${geckmisMusteriler} müşteri</div>
    </div>
  `;

  document.getElementById('bu-ay-badge').textContent = buAyTaksitler.length + ' taksit · ' + fmtM(buAyToplam) + ' ₺';
  document.getElementById('bu-ay-tbl').innerHTML = taksitTable(buAyTaksitler.sort((a,b)=>(parseDate(a.VADE)||0)-(parseDate(b.VADE)||0)));

  document.getElementById('gecikme-badge').textContent = gecikmisTaksitler.length + ' taksit · ' + fmtM(gecikmesToplam) + ' ₺';
  document.getElementById('gecikme-tbl').innerHTML = taksitTable(gecikmisTaksitler.sort((a,b)=>(parseDate(a.VADE)||0)-(parseDate(b.VADE)||0)));
}

// GÜNLÜK
function setGunFilter(f, el) {
  gunFilter = f;
  document.querySelectorAll('#panel-gunluk .filter-btn').forEach(b=>b.classList.remove('active'));
  if(el && el.classList) el.classList.add('active');
  renderGunluk();
}

function renderGunluk() {
  if(!allData) return;
  const taksitler = allData.taksitler || [];
  const now = today();
  let from, to, title;

  if(gunFilter==='bugun') { from=to=now; title='Bugünkü Ödemeler'; }
  else if(gunFilter==='yarin') { from=to=new Date(now.getTime()+86400000); title='Yarınki Ödemeler'; }
  else if(gunFilter==='3gun') { from=now; to=new Date(now.getTime()+2*86400000); title='3 Günlük Ödemeler'; }
  else if(gunFilter==='7gun') { from=now; to=new Date(now.getTime()+6*86400000); title='7 Günlük Ödemeler'; }
  else if(gunFilter==='tarih') {
    const v = document.getElementById('gun-date').value;
    if(!v) return;
    from=to=new Date(v); from.setHours(0,0,0,0); to.setHours(0,0,0,0);
    title = from.toLocaleDateString('tr-TR') + ' Ödemeleri';
  }

  const list = taksitler.filter(t=>{
    const v = parseDate(t.VADE); if(!v) return false;
    v.setHours(0,0,0,0);
    return v >= from && v <= to;
  }).sort((a,b)=>(parseDate(a.VADE)||0)-(parseDate(b.VADE)||0));

  const toplam = list.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);
  document.getElementById('gunluk-title').textContent = title;
  document.getElementById('gunluk-badge').textContent = list.length + ' taksit · ' + fmtM(toplam) + ' ₺';
  document.getElementById('gunluk-tbl').innerHTML = taksitTable(list);
}

// HAFTALIK
function setHaftaFilter(f, el) {
  haftaFilter = f;
  document.querySelectorAll('#panel-haftalik .filter-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderHaftalik();
}

function renderHaftalik() {
  if(!allData) return;
  const taksitler = allData.taksitler || [];
  const now = today();
  const day = now.getDay();
  const monOffset = day===0?-6:1-day;
  let from, to, title;

  if(haftaFilter==='bu') {
    from = new Date(now.getTime()+monOffset*86400000);
    to = new Date(from.getTime()+6*86400000);
    title = 'Bu Haftanın Ödemeleri';
  } else if(haftaFilter==='gelecek') {
    from = new Date(now.getTime()+(monOffset+7)*86400000);
    to = new Date(from.getTime()+6*86400000);
    title = 'Gelecek Haftanın Ödemeleri';
  } else if(haftaFilter==='2hafta') {
    from = now;
    to = new Date(now.getTime()+13*86400000);
    title = '2 Haftalık Ödemeler';
  } else {
    from = now;
    to = new Date(now.getTime()+27*86400000);
    title = '4 Haftalık Ödemeler';
  }

  const list = taksitler.filter(t=>{
    const v = parseDate(t.VADE); if(!v) return false;
    v.setHours(0,0,0,0);
    return v >= from && v <= to;
  }).sort((a,b)=>(parseDate(a.VADE)||0)-(parseDate(b.VADE)||0));

  const toplam = list.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);
  document.getElementById('haftalik-title').textContent = title;
  document.getElementById('haftalik-badge').textContent = list.length + ' taksit · ' + fmtM(toplam) + ' ₺';
  document.getElementById('haftalik-tbl').innerHTML = taksitTable(list);
}

// AY SELECT
function buildAySelect() {
  const now = new Date();
  const sel = document.getElementById('ay-select');
  const sel2 = document.getElementById('gecmis-ay-select');
  let opts = '';
  for(let i=0; i<12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-6+i, 1);
    const val = d.getFullYear()+'-'+(d.getMonth()+1);
    const lbl = AYLAR[d.getMonth()] + ' ' + d.getFullYear();
    opts += `<option value="${val}">${lbl}</option>`;
  }
  sel.innerHTML = opts;
  sel.value = now.getFullYear()+'-'+(now.getMonth()+1);
  sel2.innerHTML = '';
  for(let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const val = d.getFullYear()+'-'+(d.getMonth()+1);
    const lbl = AYLAR[d.getMonth()] + ' ' + d.getFullYear();
    sel2.innerHTML += `<option value="${val}">${lbl}</option>`;
  }
  sel2.value = now.getFullYear()+'-'+(now.getMonth());
}

function setAyFilter(f, el) {
  if(f==='secim') {
    ayFilter = 'secim';
    ayFilterDate = document.getElementById('ay-select').value;
  } else {
    ayFilter = f;
    const now = new Date();
    if(f==='bu') ayFilterDate = now.getFullYear()+'-'+(now.getMonth()+1);
    else ayFilterDate = now.getFullYear()+'-'+(now.getMonth()+2);
    document.getElementById('ay-select').value = ayFilterDate;
  }
  document.querySelectorAll('#panel-aylik .filter-btn').forEach(b=>b.classList.remove('active'));
  if(el && el.classList) el.classList.add('active');
  renderAylik();
}

function renderAylik() {
  if(!allData) return;
  const taksitler = allData.taksitler || [];
  const proje = document.getElementById('proje-filter-ay').value;
  const parts = (ayFilterDate||'').split('-');
  if(!parts[0]) return;
  const year = parseInt(parts[0]);
  const month = parseInt(parts[1])-1;

  const list = taksitler.filter(t=>{
    const v = parseDate(t.VADE); if(!v) return false;
    if(v.getFullYear()!==year||v.getMonth()!==month) return false;
    if(proje && t.PROJE!==proje) return false;
    return true;
  }).sort((a,b)=>(parseDate(a.VADE)||0)-(parseDate(b.VADE)||0));

  const toplam = list.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);
  const title = AYLAR[month] + ' ' + year + ' Taksit Planı';
  document.getElementById('aylik-title').textContent = title;
  document.getElementById('aylik-badge').textContent = list.length + ' taksit · ' + fmtM(toplam) + ' ₺';
  document.getElementById('aylik-tbl').innerHTML = taksitTable(list);
}

// GEÇMİŞ AYLAR
function renderGecmis() {
  if(!allData) return;
  const taksitler = allData.taksitler || [];
  const now = new Date();
  const grid = document.getElementById('gecmis-ay-grid');

  let html = '';
  for(let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const year = d.getFullYear();
    const month = d.getMonth();

    const ayTaksitler = taksitler.filter(t=>{
      const v = parseDate(t.VADE);
      return v && v.getFullYear()===year && v.getMonth()===month;
    });

    const odenen = ayTaksitler.filter(t=>{
      const odeme = parseDate(t['ÖDEME TARİHİ']);
      const durum = (t.DURUM||'').toUpperCase();
      return durum.includes('ÖDENDİ')||odeme;
    });

    const odenmis = odenen.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);
    const odenmemis = ayTaksitler.filter(t=>{
      const odeme = parseDate(t['ÖDEME TARİHİ']);
      const durum = (t.DURUM||'').toUpperCase();
      return !durum.includes('ÖDENDİ')&&!odeme;
    });
    const odenmemisToplam = odenmemis.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);

    html += `<div class="ay-kart" onclick="selectGecmisAy('${year}-${month+1}')">
      <div class="ay-baslik">${AYLAR[month]} ${year}</div>
      <div class="ay-tahsil">+${fmtM(odenmis)} ₺</div>
      ${odenmemisToplam > 0 ? `<div class="ay-tahsil-edilemeyen">-${fmtM(odenmemisToplam)} ₺ ödenmedi</div>` : '<div style="font-size:11px;color:var(--green);margin-top:4px">✓ Tam tahsilat</div>'}
      <div class="ay-kisi">${odenen.length}/${ayTaksitler.length} taksit · ${odenmemis.length} bekliyor</div>
    </div>`;
  }
  grid.innerHTML = html;
  renderGecmisDetay();
}

function selectGecmisAy(val) {
  document.getElementById('gecmis-ay-select').value = val;
  renderGecmisDetay();
}

function renderGecmisDetay() {
  if(!allData) return;
  const taksitler = allData.taksitler || [];
  const val = document.getElementById('gecmis-ay-select').value;
  const proje = document.getElementById('proje-filter-gecmis').value;
  if(!val) return;

  const parts = val.split('-');
  const year = parseInt(parts[0]);
  const month = parseInt(parts[1])-1;

  // Tahsil edilemeyen = vadesi geçmiş, ödenmemiş
  const list = taksitler.filter(t=>{
    const v = parseDate(t.VADE); if(!v) return false;
    if(v.getFullYear()!==year||v.getMonth()!==month) return false;
    const odeme = parseDate(t['ÖDEME TARİHİ']);
    const durum = (t.DURUM||'').toUpperCase();
    if(durum.includes('ÖDENDİ')||odeme) return false;
    if(proje && t.PROJE!==proje) return false;
    return true;
  }).sort((a,b)=>(parseFloat(b.TUTAR)||0)-(parseFloat(a.TUTAR)||0));

  const toplam = list.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);
  document.getElementById('gecmis-detay-title').textContent = AYLAR[month]+' '+year+' — Tahsil Edilemeyen Müşteriler';
  document.getElementById('gecmis-detay-badge').textContent = list.length + ' müşteri · ' + fmtM(toplam) + ' ₺';
  document.getElementById('gecmis-detay-tbl').innerHTML = taksitTable(list);
}

// GELECEK AY
function renderGelecek() {
  if(!allData) return;
  const taksitler = allData.taksitler || [];
  const now = new Date();
  const year = now.getMonth()===11 ? now.getFullYear()+1 : now.getFullYear();
  const month = (now.getMonth()+1)%12;
  const proje = document.getElementById('proje-filter-gelecek').value;

  const list = taksitler.filter(t=>{
    const v = parseDate(t.VADE); if(!v) return false;
    if(v.getFullYear()!==year||v.getMonth()!==month) return false;
    if(proje && t.PROJE!==proje) return false;
    return true;
  }).sort((a,b)=>(parseDate(a.VADE)||0)-(parseDate(b.VADE)||0));

  const toplam = list.reduce((s,t)=>s+(parseFloat(t.TUTAR)||0),0);
  document.getElementById('gelecek-title').textContent = AYLAR[month]+' '+year+' Taksit Planı';
  document.getElementById('gelecek-badge').textContent = list.length + ' taksit · ' + fmtM(toplam) + ' ₺';
  document.getElementById('gelecek-tbl').innerHTML = taksitTable(list);
}

// TAB
function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
}

// ERTELEME
let ertFilter = 'tumu';

function setErtFilter(f, el) {
  ertFilter = f;
  document.querySelectorAll('#panel-erteleme .filter-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  renderErteleme();
}

function renderErteleme() {
  if(!allData) return;
  const ertelemeler = allData.ertelemeler || [];
  const proje = document.getElementById('proje-filter-ert').value;
  const q = document.getElementById('ert-search').value.toLowerCase();
  const now = today();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  let list = ertelemeler.filter(e => {
    if(proje && e.PROJE !== proje) return false;
    if(q && !String(e['MÜŞTERİ']||'').toLowerCase().includes(q)) return false;
    if(ertFilter === 'bu_ay') {
      const d = new Date(e['ERTELEME TARİHİ']);
      if(isNaN(d) || d.getMonth()!==thisMonth || d.getFullYear()!==thisYear) return false;
    }
    if(ertFilter === '1_kez' && parseInt(e['ERTELEME SAYISI']||0) !== 1) return false;
    if(ertFilter === 'cok' && parseInt(e['ERTELEME SAYISI']||0) < 2) return false;
    return true;
  }).sort((a,b) => new Date(b['ERTELEME TARİHİ']) - new Date(a['ERTELEME TARİHİ']));

  // KPI
  const toplamErt = list.length;
  const benzersizMusteri = new Set(list.map(e=>e['MÜŞTERİ'])).size;
  const cokErt = list.filter(e=>parseInt(e['ERTELEME SAYISI']||0)>=2).length;
  const buAyErt = ertelemeler.filter(e=>{
    const d = new Date(e['ERTELEME TARİHİ']);
    return !isNaN(d) && d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  }).length;

  document.getElementById('ert-kpi').innerHTML = `
    <div class="kpi gold"><div class="kpi-label">Toplam Erteleme</div><div class="kpi-value gold">${toplamErt}</div><div class="kpi-sub">tüm zamanlar</div></div>
    <div class="kpi blue"><div class="kpi-label">Farklı Müşteri</div><div class="kpi-value blue">${benzersizMusteri}</div><div class="kpi-sub">erteleme yapılan</div></div>
    <div class="kpi red"><div class="kpi-label">2+ Kez Ertelenen</div><div class="kpi-value red">${cokErt}</div><div class="kpi-sub">riskli müşteriler</div></div>
    <div class="kpi gold"><div class="kpi-label">Bu Ay</div><div class="kpi-value gold">${buAyErt}</div><div class="kpi-sub">yeni erteleme</div></div>
  `;

  document.getElementById('ert-badge').textContent = list.length + ' kayıt';

  if(!list.length) {
    document.getElementById('ert-tbl').innerHTML = '<table><tbody><tr><td colspan="8" style="text-align:center;color:var(--text3);padding:2rem">Erteleme kaydı bulunamadı</td></tr></tbody></table>';
  } else {
    document.getElementById('ert-tbl').innerHTML = `<table>
      <thead><tr>
        <th>MÜŞTERİ</th><th>PROJE</th><th>TAKSİT</th>
        <th>ESKİ VADE</th><th>YENİ VADE</th><th>SEBEP</th>
        <th>ERTELEME TARİHİ</th><th style="text-align:center">KAÇ KEZ</th>
      </tr></thead>
      <tbody>${list.map(e=>{
        const eskiV = e['ESKİ VADE'] ? new Date(e['ESKİ VADE']).toLocaleDateString('tr-TR') : '—';
        const yeniV = e['YENİ VADE'] ? new Date(e['YENİ VADE']).toLocaleDateString('tr-TR') : '—';
        const ertT = e['ERTELEME TARİHİ'] ? new Date(e['ERTELEME TARİHİ']).toLocaleDateString('tr-TR') : '—';
        const sayı = parseInt(e['ERTELEME SAYISI']||0);
        const sayıColor = sayı>=3?'var(--red)':sayı>=2?'var(--orange)':'var(--text2)';
        return `<tr>
          <td style="font-weight:500">${e['MÜŞTERİ']||''}</td>
          <td>${projeBadge(e.PROJE||'')}</td>
          <td style="font-family:'DM Mono',monospace;color:var(--text3)">#${e['TAKSİT S.NO']||''}</td>
          <td style="color:var(--red);font-family:'DM Mono',monospace;font-size:12px">${eskiV}</td>
          <td style="color:var(--green);font-family:'DM Mono',monospace;font-size:12px">${yeniV}</td>
          <td style="color:var(--text2);font-size:12px">${e.SEBEP||'—'}</td>
          <td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:12px">${ertT}</td>
          <td style="text-align:center;font-weight:700;color:${sayıColor}">${sayı}x</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  // En çok ertelenen
  const musteriSayac = {};
  ertelemeler.forEach(e => {
    const m = e['MÜŞTERİ'];
    if(!musteriSayac[m]) musteriSayac[m] = { musteri: m, proje: e.PROJE, count: 0 };
    musteriSayac[m].count++;
  });
  const topList = Object.values(musteriSayac).sort((a,b)=>b.count-a.count).slice(0,10);

  if(!topList.length) {
    document.getElementById('ert-top-tbl').innerHTML = '<table><tbody><tr><td colspan="3" style="text-align:center;color:var(--text3);padding:2rem">Henüz erteleme kaydı yok</td></tr></tbody></table>';
  } else {
    document.getElementById('ert-top-tbl').innerHTML = `<table>
      <thead><tr><th>#</th><th>MÜŞTERİ</th><th>PROJE</th><th style="text-align:center">ERTELEME SAYISI</th></tr></thead>
      <tbody>${topList.map((m,i)=>{
        const barW = Math.round(m.count/topList[0].count*100);
        const color = m.count>=3?'var(--red)':m.count>=2?'var(--orange)':'var(--blue)';
        return `<tr>
          <td style="color:var(--text3);font-family:'DM Mono',monospace">${i+1}</td>
          <td style="font-weight:500">${m.musteri}</td>
          <td>${projeBadge(m.proje||'')}</td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:4px;height:6px">
                <div style="width:${barW}%;height:6px;border-radius:4px;background:${color}"></div>
              </div>
              <span style="font-weight:700;color:${color};font-family:'DM Mono',monospace;min-width:24px">${m.count}x</span>
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }
}

// FETCH ile veri çek
async function loadData() {
  try {
    document.getElementById('status-text').textContent = 'Yükleniyor...';
    const res = await fetch(SHEETS_URL + '?action=getData');
    const data = await res.json();
    // Ertelemeler ayrı çek
    try {
      const ertRes = await fetch(SHEETS_URL + '?action=getErtelemeler');
      const ertData = await ertRes.json();
      if(ertData.data) data.ertelemeler = ertData.data;
    } catch(e) { data.ertelemeler = []; }

    allData = data;
    document.getElementById('status-dot').style.cssText = 'background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;width:8px;height:8px;border-radius:50%';
    document.getElementById('status-text').textContent = 'Bağlı';
    document.getElementById('last-update').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
    renderAll();
  } catch(e) {
    document.getElementById('status-dot').style.cssText = 'background:var(--red);width:8px;height:8px;border-radius:50%';
    document.getElementById('status-text').textContent = 'Bağlantı hatası: ' + e.message;
  }
}

function renderAll() {
  renderOzet();
  renderGunluk();
  renderHaftalik();
  renderAylik();
  renderGecmis();
  renderGelecek();
  renderErteleme();
}

// BAŞLAT
buildAySelect();
loadData();
setInterval(loadData, 300000);
</script>
